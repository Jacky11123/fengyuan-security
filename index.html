<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B3A6B">
  <title>豐原高中 校安查詢系統</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #1B3A6B;
      --navy2:   #24508F;
      --gold:    #B8972A;
      --gold-lt: #F5EDD6;
      --white:   #FFFFFF;
      --gray50:  #F7F8FA;
      --gray100: #EEF0F4;
      --gray200: #DDE1E9;
      --gray400: #9AA3B2;
      --gray700: #3D4A5C;
      --gray900: #1A2233;
      --red:     #C0392B;
      --radius:  6px;
      --shadow:  0 1px 4px rgba(27,58,107,0.10);
      --shadow2: 0 4px 16px rgba(27,58,107,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--gray50);
      color: var(--gray900);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── 頂部橫幅 ── */
    .top-banner {
      background: var(--gold);
      height: 4px;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .header-emblem {
      width: 34px;
      height: 34px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-text { flex: 1; }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header-sub {
      font-size: 11px;
      opacity: 0.65;
      letter-spacing: 0.5px;
    }
    #back-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      display: none;
    }
    .header-user { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .user-name { font-size: 12px; opacity: 0.75; }
    .logout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(160deg, #1B3A6B 0%, #0F2246 100%);
      color: var(--white);
      padding: 40px 24px;
    }
    .login-seal {
      width: 80px;
      height: 80px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(184,151,42,0.4);
    }
    .login-school {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 13px;
      opacity: 0.55;
      margin-bottom: 48px;
      letter-spacing: 1px;
    }
    .login-divider {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 48px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      color: var(--gray900);
      border: none;
      border-radius: var(--radius);
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      letter-spacing: 0.5px;
      transition: transform 0.1s;
    }
    .google-btn:active { transform: scale(0.98); }
    .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .login-notice {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 1px;
    }

    /* ── App ── */
    #app { display: none; }

    /* ── 查詢區 ── */
    .search-section {
      background: var(--navy);
      padding: 16px 16px 20px;
      border-bottom: 3px solid var(--gold);
    }
    .search-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .search-box {
      position: relative;
      margin-bottom: 10px;
    }
    .search-box input {
      width: 100%;
      padding: 11px 40px 11px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      letter-spacing: 0.5px;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.35); }
    .search-box input:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.12);
    }
    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 16px;
      cursor: pointer;
      display: none;
      padding: 0;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filter-row select {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .filter-row select:focus { border-color: var(--gold); }
    .filter-row select option { color: var(--gray900); background: var(--white); }

    .id-search {
      display: flex;
      gap: 8px;
    }
    .id-search input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      outline: none;
    }
    .id-search input::placeholder { color: rgba(255,255,255,0.35); }
    .id-search input:focus { border-color: var(--gold); }
    .id-search button {
      padding: 10px 18px;
      background: var(--gold);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── 結果區 ── */
    .results-section { padding: 16px; }
    .results-header {
      font-size: 12px;
      color: var(--gray400);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .results-header::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 12px;
      background: var(--gold);
      border-radius: 2px;
    }

    /* 單人完整卡片 */
    .student-full-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      overflow: hidden;
      border-top: 3px solid var(--navy);
    }
    .photo-wrap {
      background: linear-gradient(135deg, #EEF2F8 0%, #E0E8F4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 20px;
      position: relative;
    }
    .photo-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gray200);
    }
    .photo-wrap img {
      width: 100px;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(27,58,107,0.2);
      border: 2px solid var(--white);
    }
    .no-photo {
      width: 100px;
      height: 130px;
      background: var(--gray100);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--gray400);
      border: 2px solid var(--white);
    }
    .student-name-header {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 2px;
    }
    .student-badge {
      margin-top: 6px;
      background: var(--navy);
      color: var(--white);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .info-block { padding: 0 20px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      padding: 14px 0 8px;
      border-bottom: 1px solid var(--gray200);
      margin-bottom: 4px;
    }
    .info-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray100);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      color: var(--gray400);
      width: 80px;
      flex-shrink: 0;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .info-value {
      font-weight: 600;
      color: var(--gray900);
      letter-spacing: 0.5px;
    }
    .contact-row {
      display: flex;
      flex-direction: column;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray100);
      gap: 4px;
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray900);
    }
    .contact-relation {
      font-size: 11px;
      color: var(--gray400);
      background: var(--gray100);
      padding: 1px 8px;
      border-radius: 3px;
      display: inline-block;
      margin-left: 6px;
    }
    .contact-phone {
      font-size: 15px;
      color: var(--navy2);
      font-weight: 600;
      letter-spacing: 1px;
    }
    .no-contact {
      font-size: 13px;
      color: var(--gray400);
      padding: 12px 0;
      text-align: center;
    }
    .card-footer {
      background: var(--gray50);
      padding: 10px 20px;
      font-size: 11px;
      color: var(--gray400);
      border-top: 1px solid var(--gray200);
      letter-spacing: 0.5px;
    }

    /* 多人列表 */
    .student-list {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      overflow: hidden;
      border-top: 3px solid var(--navy);
    }
    .list-header {
      background: var(--navy);
      color: var(--white);
      padding: 10px 16px;
      font-size: 12px;
      letter-spacing: 1px;
      display: flex;
      gap: 20px;
    }
    .list-col { flex: 1; opacity: 0.7; }
    .student-list-item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--gray100);
      cursor: pointer;
      transition: background 0.15s;
    }
    .student-list-item:last-child { border-bottom: none; }
    .student-list-item:hover { background: var(--gray50); }
    .student-list-item:active { background: var(--gold-lt); }
    .item-seat {
      width: 36px;
      height: 36px;
      background: var(--navy);
      color: var(--white);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 12px;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 16px; font-weight: 600; color: var(--gray900); }
    .item-meta { font-size: 12px; color: var(--gray400); margin-top: 2px; letter-spacing: 0.5px; }
    .item-arrow { color: var(--gray400); font-size: 18px; }

    /* 狀態訊息 */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray400);
    }
    .state-icon { font-size: 36px; margin-bottom: 12px; }
    .state-text { font-size: 14px; line-height: 1.8; letter-spacing: 0.5px; }

    .error-msg {
      background: #fdf2f2;
      border-left: 4px solid var(--red);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 16px;
    }
  </style>
</head>
<body>

<div class="top-banner"></div>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="login-seal">🏫</div>
  <div class="login-school">FENGYUAN SENIOR HIGH SCHOOL</div>
  <div class="login-title">校安查詢系統</div>
  <div class="login-subtitle">臺中市立豐原高級中等學校</div>
  <div class="login-divider"></div>
  <button class="google-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    使用學校 Google 帳號登入
  </button>
  <div class="login-notice">僅限 @fysh.tc.edu.tw 帳號</div>
</div>

<!-- 主系統 -->
<div id="app">
  <div class="top-banner"></div>
  <header>
    <button id="back-btn" onclick="goBack()">← 返回</button>
    <div class="header-emblem">🛡</div>
    <div class="header-text">
      <div class="header-title" id="header-title">校安查詢系統</div>
      <div class="header-sub">臺中市立豐原高級中等學校</div>
    </div>
    <div class="header-user">
      <span class="user-name" id="user-name"></span>
      <button class="logout-btn" onclick="signOut()">登出</button>
    </div>
  </header>

  <!-- 查詢頁 -->
  <div id="search-view">
    <div class="search-section">
      <div class="search-label">姓名查詢</div>
      <div class="search-box">
        <input type="text" id="name-input" placeholder="輸入學生姓名..." oninput="onNameInput(this.value)">
        <button class="search-clear" id="clear-btn" onclick="clearSearch()">✕</button>
      </div>

      <div class="search-label">班級篩選</div>
      <div class="filter-row">
        <select id="grade-select" onchange="onGradeChange()">
          <option value="">年級</option>
          <option value="1">高一</option>
          <option value="2">高二</option>
          <option value="3">高三</option>
        </select>
        <select id="class-select" onchange="onFilterChange()">
          <option value="">班級（請先選年級）</option>
        </select>
      </div>

      <div class="search-label">學號直查</div>
      <div class="id-search">
        <input type="text" id="id-input" placeholder="輸入學號（如 411001）" maxlength="8" inputmode="numeric">
        <button onclick="searchById()">查詢</button>
      </div>
    </div>

    <div class="results-section" id="results-section">
      <div class="state-msg">
        <div class="state-icon">🔍</div>
        <div class="state-text">請輸入姓名、學號<br>或選擇年級班級</div>
      </div>
    </div>
  </div>

  <!-- 詳細頁 -->
  <div id="detail-view" style="display:none;">
    <div class="results-section" id="detail-content"></div>
  </div>
</div>

<script>
const CONFIG = {
  CLIENT_ID: '773530671501-77u0injdd4nkjauqvnto826f5glsg9vn.apps.googleusercontent.com',
  SHEET_ID:  '1pbAxCNWxy-h_OwFanoEc-L_jdNmDvxhsgHubYaPZWIY',
  ALLOWED_DOMAIN: 'fysh.tc.edu.tw',
};

let allStudents = [];
let allContacts = [];
let tokenClient;
let accessToken = null;

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/drive.readonly email profile',
    callback: async (resp) => {
      if (resp.error) { alert('登入失敗：' + resp.error); return; }
      accessToken = resp.access_token;
      const profile = await fetchUserProfile();
      if (!profile.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
        alert('僅限學校帳號（@' + CONFIG.ALLOWED_DOMAIN + '）登入');
        signOut(); return;
      }
      document.getElementById('user-name').textContent = profile.name || profile.email.split('@')[0];
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await loadData();
    },
  });
}

function signIn() { tokenClient.requestAccessToken({ prompt: 'select_account' }); }
function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  });
}
async function fetchUserProfile() {
  const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } });
  return r.json();
}

async function loadData() {
  showLoading();
  try {
    const base = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values`;
    const headers = { Authorization: 'Bearer ' + accessToken };
    const [s1, s2] = await Promise.all([
      fetch(`${base}/學生資料!A2:F2000`, { headers }).then(r => r.json()),
      fetch(`${base}/緊急聯絡人!A2:E2000`, { headers }).then(r => r.json()),
    ]);
    allStudents = (s1.values || []).map(r => ({
      id: r[0]||'', name: r[1]||'', grade: r[2]||'', class: r[3]||'', seat: r[4]||'', photoId: r[5]||''
    })).filter(s => s.id && s.name);
    allContacts = (s2.values || []).map(r => ({
      studentId: r[0]||'', name: r[1]||'', relation: r[2]||'', phone: r[3]||''
    })).filter(c => c.studentId);
    showHint();
  } catch(e) {
    showError('資料載入失敗，請重新整理頁面。');
  }
}

function onGradeChange() {
  const g = document.getElementById('grade-select').value;
  const classSelect = document.getElementById('class-select');
  const classes = [...new Set(allStudents.filter(s => !g || s.grade === g).map(s => s.class))].sort((a,b) => parseInt(a)-parseInt(b));
  classSelect.innerHTML = '<option value="">班級（全部）</option>';
  classes.forEach(c => { classSelect.innerHTML += `<option value="${c}">${c}班</option>`; });
  onFilterChange();
}

function onNameInput(val) {
  document.getElementById('clear-btn').style.display = val ? 'block' : 'none';
  if (val.length >= 1) {
    const g = document.getElementById('grade-select').value;
    const cls = document.getElementById('class-select').value;
    search(val, g, cls);
  } else { showHint(); }
}

function onFilterChange() {
  const g = document.getElementById('grade-select').value;
  const cls = document.getElementById('class-select').value;
  const name = document.getElementById('name-input').value;
  if (g || cls || name) search(name, g, cls);
  else showHint();
}

function searchById() {
  const id = document.getElementById('id-input').value.trim();
  if (!id) return;
  renderResults(allStudents.filter(s => s.id === id));
}

function clearSearch() {
  document.getElementById('name-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('grade-select').value = '';
  document.getElementById('class-select').innerHTML = '<option value="">班級（請先選年級）</option>';
  showHint();
}

function search(name, grade, cls) {
  const results = allStudents.filter(s => {
    return (!name || s.name.includes(name)) &&
           (!grade || s.grade === grade) &&
           (!cls || s.class === cls);
  });
  renderResults(results);
}

function renderResults(results) {
  const c = document.getElementById('results-section');
  if (!results.length) {
    c.innerHTML = `<div class="state-msg"><div class="state-icon">😔</div><div class="state-text">查無符合資料</div></div>`;
    return;
  }
  if (results.length === 1) {
    c.innerHTML = `<div class="results-header">查詢結果：1 筆</div>` + buildFullCard(results[0]);
    return;
  }
  c.innerHTML = `<div class="results-header">查詢結果：${results.length} 筆，點選查看詳細</div>`;
  const list = document.createElement('div');
  list.className = 'student-list';
  list.innerHTML = `<div class="list-header"><span class="list-col">座號</span><span class="list-col">姓名</span><span class="list-col">班級</span></div>`;
  results.forEach(s => {
    const item = document.createElement('div');
    item.className = 'student-list-item';
    item.innerHTML = `
      <div class="item-seat">${s.seat||'-'}</div>
      <div class="item-info">
        <div class="item-name">${s.name}</div>
        <div class="item-meta">高${s.grade} ${s.class}班 · ${s.id}</div>
      </div>
      <div class="item-arrow">›</div>`;
    item.onclick = () => showDetail(s);
    list.appendChild(item);
  });
  c.appendChild(list);
}

function buildFullCard(s) {
  const contacts = allContacts.filter(c => c.studentId === s.id);
  const photoSrc = s.photoId ? `https://lh3.googleusercontent.com/d/${s.photoId}=w300` : '';
  const photoHtml = photoSrc
    ? `<img src="${photoSrc}" alt="${s.name}" onerror="this.outerHTML='<div class=no-photo>👤</div>'">`
    : `<div class="no-photo">👤</div>`;
  const contactHtml = contacts.length
    ? contacts.map(c => `
        <div class="contact-row">
          <div class="contact-name">${c.name}<span class="contact-relation">${c.relation||'家長'}</span></div>
          <div class="contact-phone">📞 ${c.phone}</div>
        </div>`).join('')
    : `<div class="no-contact">無緊急聯絡人資料</div>`;
  return `
    <div class="student-full-card">
      <div class="photo-wrap">
        ${photoHtml}
        <div class="student-name-header">${s.name}</div>
        <div class="student-badge">高${s.grade} ${s.class}班 ${s.seat}號</div>
      </div>
      <div class="info-block">
        <div class="section-title">基本資料</div>
        <div class="info-row"><div class="info-label">學號</div><div class="info-value">${s.id}</div></div>
        <div class="info-row"><div class="info-label">年級班級</div><div class="info-value">高${s.grade} ${s.class}班</div></div>
        <div class="info-row"><div class="info-label">座號</div><div class="info-value">${s.seat} 號</div></div>
        <div class="section-title">緊急聯絡人</div>
        ${contactHtml}
      </div>
      <div class="card-footer">豐原高中校安查詢系統 · 僅供校安業務使用</div>
    </div>`;
}

function showDetail(s) {
  document.getElementById('search-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-title').textContent = s.name;
  document.getElementById('detail-content').innerHTML = `<div class="results-header">學生詳細資料</div>` + buildFullCard(s);
}

function goBack() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-title').textContent = '校安查詢系統';
}

function showLoading() {
  document.getElementById('results-section').innerHTML = `<div class="state-msg"><div class="state-icon">⏳</div><div class="state-text">載入學生資料中…</div></div>`;
}
function showHint() {
  document.getElementById('results-section').innerHTML = `<div class="state-msg"><div class="state-icon">🔍</div><div class="state-text">請輸入姓名、學號<br>或選擇年級班級</div></div>`;
}
function showError(msg) {
  document.getElementById('results-section').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
}

// ── 右滑返回手勢 ──
(function() {
  let startX = 0, startY = 0, isHorizontal = false;

  document.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isHorizontal = false;
  }, { passive: true });

  document.addEventListener("touchmove", (e) => {
    const dx = e.touches[0].clientX - startX;
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (!isHorizontal && Math.abs(dx) > 10 && dy < 10) {
      isHorizontal = true;
    }
  }, { passive: true });

  document.addEventListener("touchend", (e) => {
    const diffX = e.changedTouches[0].clientX - startX;
    const diffY = Math.abs(e.changedTouches[0].clientY - startY);
    const detailVisible = document.getElementById("detail-view").style.display !== "none";
    // 從左側1/3區域開始右滑，距離超過60px
    if (isHorizontal && diffX > 60 && diffY < 80 && startX < window.innerWidth / 3 && detailVisible) {
      goBack();
    }
  }, { passive: true });
})();

window.onload = () => { initGoogleAuth(); };
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
