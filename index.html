<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a3a5c">
  <title>豐原高中 校安查詢系統</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:   #1a3a5c;
      --blue:   #2563a8;
      --sky:    #e8f0fa;
      --white:  #ffffff;
      --gray50: #f8f9fb;
      --gray200:#e2e8f0;
      --gray500:#64748b;
      --gray800:#1e293b;
      --red:    #dc2626;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(26,58,92,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--gray50);
      color: var(--gray800);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header .back-btn {
      background: none;
      border: none;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      display: none;
    }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    header .subtitle {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 2px;
    }
    .header-user {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-user img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .logout-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: var(--white);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      background: var(--navy);
      color: var(--white);
    }
    .login-logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 48px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      color: var(--gray800);
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .google-btn:active { transform: scale(0.98); }
    .google-btn svg { width: 20px; height: 20px; }
    .login-notice {
      margin-top: 24px;
      font-size: 12px;
      opacity: 0.5;
      text-align: center;
    }

    /* ── Main App ── */
    #app { display: none; }

    /* ── Search Section ── */
    .search-section {
      background: var(--navy);
      padding: 16px 16px 24px;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      outline: none;
      transition: background 0.2s;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.5); }
    .search-box input:focus { background: rgba(255,255,255,0.18); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
    }
    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: none;
    }

    /* Filter Row */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .filter-row select {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .filter-row select option { color: var(--gray800); background: var(--white); }

    /* Student ID Search */
    .id-search {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .id-search input {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      outline: none;
    }
    .id-search input::placeholder { color: rgba(255,255,255,0.5); }
    .id-search button {
      padding: 9px 18px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
    }

    /* ── Results ── */
    .results-section {
      padding: 16px;
    }
    .results-header {
      font-size: 13px;
      color: var(--gray500);
      margin-bottom: 12px;
      padding: 0 2px;
    }

    /* Single result → full card */
    .student-full-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .student-full-card .photo-wrap {
      background: var(--sky);
      display: flex;
      justify-content: center;
      padding: 28px 0 20px;
    }
    .student-full-card .photo-wrap img {
      width: 110px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .student-full-card .photo-wrap .no-photo {
      width: 110px;
      height: 140px;
      background: var(--gray200);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--gray500);
    }
    .student-full-card .info {
      padding: 20px;
    }
    .student-full-card .name {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }
    .info-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray200);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      color: var(--gray500);
      width: 90px;
      flex-shrink: 0;
      font-size: 13px;
    }
    .info-value { font-weight: 500; }
    .section-divider {
      background: var(--sky);
      padding: 8px 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 1px;
    }

    /* Multiple results → list */
    .student-list {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .student-list-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray200);
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
    }
    .student-list-item:last-child { border-bottom: none; }
    .student-list-item:active { background: var(--sky); }
    .student-list-item .item-info { flex: 1; }
    .student-list-item .item-name {
      font-size: 16px;
      font-weight: 500;
    }
    .student-list-item .item-meta {
      font-size: 12px;
      color: var(--gray500);
      margin-top: 2px;
    }
    .student-list-item .arrow {
      color: var(--gray500);
      font-size: 18px;
    }

    /* Empty / Loading */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray500);
    }
    .state-msg .icon { font-size: 40px; margin-bottom: 12px; }
    .state-msg p { font-size: 14px; }

    /* Error */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      margin: 16px;
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-logo">🏫</div>
  <div class="login-title">校安查詢系統</div>
  <div class="login-subtitle">臺中市立豐原高級中等學校</div>
  <button class="google-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    使用學校 Google 帳號登入
  </button>
  <div class="login-notice">僅限 @fysh.tc.edu.tw 帳號</div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <button class="back-btn" id="back-btn" onclick="goBack()">←</button>
    <div>
      <div id="header-title" style="font-size:17px;font-weight:700;">豐原高中 校安查詢</div>
    </div>
    <div class="header-user">
      <img id="user-avatar" src="" alt="" style="display:none">
      <button class="logout-btn" onclick="signOut()">登出</button>
    </div>
  </header>

  <!-- Search View -->
  <div id="search-view">
    <div class="search-section">
      <!-- 姓名搜尋 -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="name-input" placeholder="輸入姓名搜尋..."
               oninput="onNameInput(this.value)">
        <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
      </div>

      <!-- 班級篩選 -->
      <div class="filter-row">
        <select id="grade-select" onchange="onFilterChange()">
          <option value="">年級（全部）</option>
          <option value="1">高一</option>
          <option value="2">高二</option>
          <option value="3">高三</option>
        </select>
        <select id="class-select" onchange="onFilterChange()">
          <option value="">班級（全部）</option>
        </select>
      </div>

      <!-- 學號直查 -->
      <div class="id-search">
        <input type="text" id="id-input" placeholder="學號直接查詢（如 411001）"
               maxlength="8" inputmode="numeric">
        <button onclick="searchById()">查詢</button>
      </div>
    </div>

    <div class="results-section" id="results-section">
      <div class="state-msg">
        <div class="icon">🔍</div>
        <p>輸入姓名或學號<br>也可以用班級篩選</p>
      </div>
    </div>
  </div>

  <!-- Detail View -->
  <div id="detail-view" style="display:none;">
    <div class="results-section" id="detail-content"></div>
  </div>
</div>

<script>
// ============================================================
// 設定區（上線前修改這裡）
// ============================================================
const CONFIG = {
  CLIENT_ID: '773530671501-77u0injdd4nkjauqvnto826f5glsg9vn.apps.googleusercontent.com',
  SHEET_ID:  '1pbAxCNWxy-h_OwFanoEc-L_jdNmDvxhsgHubYaPZWIY',
  ALLOWED_DOMAIN: 'fysh.tc.edu.tw',
  DRIVE_PHOTO_FOLDER: 'YOUR_DRIVE_FOLDER_ID',
};

// ============================================================
// 全域狀態
// ============================================================
let allStudents = [];   // Sheet1 資料
let allContacts = [];   // Sheet2 緊急聯絡人
let tokenClient;
let accessToken = null;

// ============================================================
// Google 登入
// ============================================================
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/drive.readonly email profile',
    callback: async (resp) => {
      if (resp.error) { alert('登入失敗：' + resp.error); return; }
      accessToken = resp.access_token;

      // 驗證網域
      const profile = await fetchUserProfile();
      if (!profile.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
        alert('僅限學校帳號（@' + CONFIG.ALLOWED_DOMAIN + '）登入');
        signOut();
        return;
      }

      // 顯示使用者
      const avatar = document.getElementById('user-avatar');
      if (profile.picture) {
        avatar.src = profile.picture;
        avatar.style.display = 'block';
      }

      // 顯示主畫面
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      // 載入資料
      await loadData();
    },
  });
}

function signIn() {
  tokenClient.requestAccessToken({ prompt: 'select_account' });
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  });
}

async function fetchUserProfile() {
  const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  return r.json();
}

// ============================================================
// 載入 Google Sheets 資料
// ============================================================
async function loadData() {
  showLoading();
  try {
    const base = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values`;
    const headers = { Authorization: 'Bearer ' + accessToken };

    const [s1, s2] = await Promise.all([
      fetch(`${base}/學生資料!A2:F2000`, { headers }).then(r => r.json()),
      fetch(`${base}/緊急聯絡人!A2:E2000`, { headers }).then(r => r.json()),
    ]);

    // Sheet1：學號, 姓名, 年級, 班級, 座號, 照片DriveID
    allStudents = (s1.values || []).map(r => ({
      id:      r[0] || '',
      name:    r[1] || '',
      grade:   r[2] || '',
      class:   r[3] || '',
      seat:    r[4] || '',
      photoId: r[5] || '',
    })).filter(s => s.id && s.name);

    // Sheet2：學號, 姓名, 關係, 電話, 備註
    allContacts = (s2.values || []).map(r => ({
      studentId: r[0] || '',
      name:      r[1] || '',
      relation:  r[2] || '',
      phone:     r[3] || '',
      note:      r[4] || '',
    })).filter(c => c.studentId);

    // 產生班級選單
    buildClassOptions();

    showEmptyHint();
  } catch (e) {
    showError('載入資料失敗，請重新整理頁面。');
    console.error(e);
  }
}

function buildClassOptions() {
  const gradeSelect = document.getElementById('grade-select');
  const classSelect = document.getElementById('class-select');

  gradeSelect.onchange = () => {
    const g = gradeSelect.value;
    const classes = [...new Set(
      allStudents
        .filter(s => !g || s.grade === g)
        .map(s => s.class)
    )].sort();

    classSelect.innerHTML = '<option value="">班級（全部）</option>';
    classes.forEach(c => {
      classSelect.innerHTML += `<option value="${c}">${c}班</option>`;
    });
    onFilterChange();
  };
}

// ============================================================
// 搜尋邏輯
// ============================================================
function onNameInput(val) {
  document.getElementById('clear-btn').style.display = val ? 'block' : 'none';
  if (val.length >= 1) {
    search(val, '', '');
  } else {
    showEmptyHint();
  }
}

function onFilterChange() {
  const grade = document.getElementById('grade-select').value;
  const cls   = document.getElementById('class-select').value;
  const name  = document.getElementById('name-input').value;
  if (grade || cls || name) {
    search(name, grade, cls);
  } else {
    showEmptyHint();
  }
}

function searchById() {
  const id = document.getElementById('id-input').value.trim();
  if (!id) return;
  const found = allStudents.filter(s => s.id === id);
  renderResults(found);
}

function clearSearch() {
  document.getElementById('name-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('grade-select').value = '';
  document.getElementById('class-select').value = '';
  showEmptyHint();
}

function search(name, grade, cls) {
  const results = allStudents.filter(s => {
    const matchName  = !name  || s.name.includes(name);
    const matchGrade = !grade || s.grade === grade;
    const matchClass = !cls   || s.class === cls;
    return matchName && matchGrade && matchClass;
  });
  renderResults(results);
}

// ============================================================
// 渲染結果
// ============================================================
function renderResults(results) {
  const container = document.getElementById('results-section');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="state-msg">
        <div class="icon">😔</div>
        <p>找不到符合的學生</p>
      </div>`;
    return;
  }

  if (results.length === 1) {
    // 單筆 → 直接展開
    container.innerHTML = `<div class="results-header">找到 1 筆</div>`;
    container.innerHTML += buildFullCard(results[0]);
    return;
  }

  // 多筆 → 列表
  container.innerHTML = `<div class="results-header">找到 ${results.length} 筆，點選查看詳細</div>`;
  const list = document.createElement('div');
  list.className = 'student-list';
  results.forEach(s => {
    const item = document.createElement('div');
    item.className = 'student-list-item';
    item.innerHTML = `
      <div class="item-info">
        <div class="item-name">${s.name}</div>
        <div class="item-meta">${s.grade ? '高'+s.grade : ''}${s.class ? ' ' + s.class + '班' : ''} ${s.seat ? s.seat + '號' : ''} · ${s.id}</div>
      </div>
      <div class="arrow">›</div>`;
    item.onclick = () => showDetail(s);
    list.appendChild(item);
  });
  container.appendChild(list);
}

function buildFullCard(s) {
  const contacts = allContacts.filter(c => c.studentId === s.id);
  const photoSrc = s.photoId
    ? `https://drive.google.com/thumbnail?id=${s.photoId}&sz=w300`
    : '';

  const photoHtml = photoSrc
    ? `<img src="${photoSrc}" alt="${s.name}" onerror="this.parentElement.innerHTML='<div class=no-photo>👤</div>'">`
    : `<div class="no-photo">👤</div>`;

  const contactRows = contacts.length
    ? contacts.map(c => `
        <div class="info-row">
          <div class="info-label">${c.relation || '聯絡人'}</div>
          <div class="info-value">${c.name}　${c.phone}</div>
        </div>`).join('')
    : `<div class="info-row"><div class="info-label" style="width:100%;color:var(--gray500)">無緊急聯絡人資料</div></div>`;

  return `
    <div class="student-full-card">
      <div class="photo-wrap">${photoHtml}</div>
      <div class="info">
        <div class="name">${s.name}</div>
        <div class="info-row">
          <div class="info-label">學號</div>
          <div class="info-value">${s.id}</div>
        </div>
        <div class="info-row">
          <div class="info-label">年級班級</div>
          <div class="info-value">高${s.grade} ${s.class}班</div>
        </div>
        <div class="info-row">
          <div class="info-label">座號</div>
          <div class="info-value">${s.seat} 號</div>
        </div>
      </div>
      <div class="section-divider">緊急聯絡人</div>
      <div class="info">${contactRows}</div>
    </div>`;
}

function showDetail(s) {
  document.getElementById('search-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-title').textContent = s.name;
  document.getElementById('detail-content').innerHTML = buildFullCard(s);
}

function goBack() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-title').textContent = '豐原高中 校安查詢';
}

// ── UI helpers ──
function showLoading() {
  document.getElementById('results-section').innerHTML = `
    <div class="state-msg"><div class="icon">⏳</div><p>載入學生資料中…</p></div>`;
}
function showEmptyHint() {
